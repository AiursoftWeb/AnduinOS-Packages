# AnduinOS Desktop Performance & Compatibility Tweaks
# Optimized for interactive desktop responsiveness, UI smoothness, and Electron sandbox support.

# Memory & VFS Cache Tuning
vm.swappiness = 10
vm.vfs_cache_pressure = 50

# Prevent UI freezing during heavy background disk writes
vm.dirty_background_ratio = 5
vm.dirty_ratio = 10

# Network Congestion Control (BBR)
net.core.rmem_max=2500000
net.core.wmem_max=2500000
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_fastopen = 3

# AppArmor Compatibility (Allow unprivileged user namespaces for Electron/AppImage)
kernel.apparmor_restrict_unprivileged_userns = 0

# Inotify Limits for apps.
fs.inotify.max_user_instances=524288
fs.inotify.max_user_watches=524288
fs.inotify.max_queued_events=524288