# AnduinOS Server Performance & High-Concurrency Tweaks
# Optimized for high throughput, massive concurrent connections, and strict server security.

# System VFS & Memory Allocation for Maximum Throughput
vm.swappiness = 60
vm.vfs_cache_pressure = 100
vm.dirty_background_ratio = 10
vm.dirty_ratio = 20

# Network Infrastructure Tuning (BBR + High Concurrency Backlog)
net.core.rmem_max=2500000
net.core.wmem_max=2500000
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_fastopen = 3
net.core.somaxconn = 4096

# Expand System File Descriptors for Massive Connection Handlers
fs.file-max = 2097152
fs.aio-max-nr = 2097152

# Retain High Security Posture on Servers (Strictly enforce AppArmor restriction)
kernel.apparmor_restrict_unprivileged_userns = 1

# Inotify Limits for server applications.
fs.inotify.max_user_instances=524288
fs.inotify.max_user_watches=524288
fs.inotify.max_queued_events=524288