<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <!-- Map "system-ui" to sans-serif -->
  <match target="pattern">
    <test name="family"><string>system-ui</string></test>
    <edit name="family" mode="prepend"><string>sans-serif</string></edit>
  </match>

  <!-- ==================================================================== -->
  <!-- 1. 全局默认回退 (拉丁 -> CJK -> Twitter Emoji -> Noto Emoji 备胎)     -->
  <!-- ==================================================================== -->
  <match target="pattern">
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend">
      <string>Noto Sans</string>
      <string>Noto Sans CJK SC</string>
      <string>Twitter Color Emoji</string>
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend">
      <string>Noto Serif</string>
      <string>Noto Serif CJK SC</string>
      <string>Twitter Color Emoji</string>
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend">
      <string>Cascadia Code</string>
      <string>Noto Sans Mono CJK SC</string>
      <string>Symbols Nerd Font</string>
      <string>Twitter Color Emoji</string>
      <string>Noto Color Emoji</string>
    </edit>
  </match>

  <!-- ==================================================================== -->
  <!-- 2. Chromium 内核补丁：原位替换 Twitter → Noto，规避行高爆炸              -->
  <!-- ==================================================================== -->
  <match target="pattern">
    <test name="prgname" compare="contains"><string>chrom</string></test>
    <test name="family" compare="eq"><string>Twitter Color Emoji</string></test>
    <edit name="family" mode="assign" binding="same"><string>Noto Color Emoji</string></edit>
  </match>

  <match target="pattern">
    <test name="prgname" compare="contains"><string>edge</string></test>
    <test name="family" compare="eq"><string>Twitter Color Emoji</string></test>
    <edit name="family" mode="assign" binding="same"><string>Noto Color Emoji</string></edit>
  </match>

  <!-- ==================================================================== -->
  <!-- 3. 语言覆盖: CJK / Thai / Arabic                                       -->
  <!-- ==================================================================== -->

  <!-- CJK sans-serif -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-HK</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" binding="strong"><string>Noto Sans CJK HK</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-TW</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" binding="strong"><string>Noto Sans CJK TC</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ja</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" binding="strong"><string>Noto Sans CJK JP</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ko</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" binding="strong"><string>Noto Sans CJK KR</string></edit>
  </match>

  <!-- Thai sans-serif -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>th</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" binding="strong"><string>Noto Sans Thai</string></edit>
  </match>

  <!-- Arabic sans-serif: Naskh for proper Arabic rendering -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>ar</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" binding="strong"><string>Noto Naskh Arabic</string></edit>
  </match>

  <!-- CJK serif -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-HK</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" binding="strong"><string>Noto Serif CJK TC</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-TW</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" binding="strong"><string>Noto Serif CJK TC</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ja</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" binding="strong"><string>Noto Serif CJK JP</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ko</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" binding="strong"><string>Noto Serif CJK KR</string></edit>
  </match>

  <!-- Thai serif -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>th</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" binding="strong"><string>Noto Serif Thai</string></edit>
  </match>

  <!-- Arabic serif: Naskh for proper Arabic rendering -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>ar</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" binding="strong"><string>Noto Naskh Arabic</string></edit>
  </match>

  <!-- CJK monospace -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-HK</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" binding="strong"><string>Noto Sans Mono CJK HK</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-TW</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" binding="strong"><string>Noto Sans Mono CJK TC</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ja</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" binding="strong"><string>Noto Sans Mono CJK JP</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ko</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" binding="strong"><string>Noto Sans Mono CJK KR</string></edit>
  </match>

  <!-- ==================================================================== -->
  <!-- 4. 特定应用补丁: 非 Chromium 的 CJK 等宽字体 → Cascadia Code             -->
  <!-- ==================================================================== -->
  <match target="pattern">
    <test name="prgname" compare="not_contains"><string>chrom</string></test>
    <test name="family" compare="contains"><string>Noto Sans Mono CJK</string></test>
    <edit name="family" mode="prepend"><string>Cascadia Code</string></edit>
  </match>

</fontconfig>
