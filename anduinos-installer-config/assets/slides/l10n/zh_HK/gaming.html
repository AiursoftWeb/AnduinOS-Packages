<div class="header">
    <h1 class="slidetitle">遊戲體驗再非笑話</h1>
</div>
<div class="main">
    <div class="text">
        <div>
            <p>以往我們總笑話 Linux 不適合玩遊戲。然而，隨著 <a href="https://store.steampowered.com/">Steam</a>、<a href="https://www.winehq.org/">Wine</a> 及 <a href="https://www.protondb.com/">Proton</a> 等計劃的進步，這種情況正迅速改變。越來越多遊戲現已獲得 Linux 的官方支援。因此，如果你是一名玩家，不要再猶豫，試試在 AnduinOS 上玩遊戲，你會發現這是一個極具競爭力的選擇。</p>
        </div>
</div>
