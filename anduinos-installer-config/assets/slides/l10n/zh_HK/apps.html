<div class="header">
    <h1 class="slidetitle">三層軟件架構，一貫流暢體驗</h1>
</div>
<div class="main">
    <div class="text">
        <div>
            <p>AnduinOS 採用簡潔的三層方法進行套件管理。底層系統依賴 <a href="https://ubuntu.com/">Ubuntu</a> 套件以確保穩定核心，而 AnduinOS 專屬組件則透過 <a href="https://github.com/aiursoftweb/apkg">Apkg</a>（我們自行開發的輕量級套件工具）進行管理。</p>
        </div>
        <div>
            <p>在面向用戶的應用程式方面，我們以 <a href="https://flatpak.org/">Flatpak</a> 取代 Snap，提供沙盒化且跨發行版的應用程式交付方案。這能讓您的應用程式與系統隔離，節省磁碟空間，並讓您輕鬆存取龐大的應用程式目錄。當然，當您需要時，<a href="https://appimage.org/">AppImage</a> 和傳統 <a href="https://wiki.debian.org/Apt">APT</a> 也隨時可用。</p>
        </div>
</div>
