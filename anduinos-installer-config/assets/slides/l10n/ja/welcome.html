<div>
<p><a href="https://www.anduinos.com/">AnduinOS</a>のごインストール、ありがとうございます！</p>

<br />
<p>AnduinOS は、Windows や macOS から移行する場合でも、馴染みやすく使いやすいことを目指して設計された、<a href="https://ubuntu.com/">Ubuntu</a>をベースとしたカスタム Linux ディストリビューションです。Ubuntu の豊富なソフトウェアエコシステムの上に<a href="https://apkg.aiursoft.com/">独自のパッケージリポジトリ</a>を構築することで、堅牢な互換性とデスクトップ向けのより洗練された体験という、両方の利点をお楽しみいただけます。ぜひご案内させていただきます！</p>
