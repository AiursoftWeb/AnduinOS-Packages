<div class="header">
    <h1 class="slidetitle">遊戲體驗不再只是笑話</h1>
</div>
<div class="main">
    <div class="text">
        <div>
            <p>過去我們常嘲笑 Linux 不適合玩遊戲。然而，隨著 <a href="https://store.steampowered.com/">Steam</a>、<a href="https://www.winehq.org/">Wine</a> 和 <a href="https://www.protondb.com/">Proton</a> 等專案的進步，這種情況正在快速改變。越來越多遊戲開始在 Linux 上獲得官方支援。所以，如果你是玩家，不要再猶豫了——試試在 AnduinOS 上遊戲，你會發現它是一個極具競爭力的選擇。</p>
        </div>
</div>
