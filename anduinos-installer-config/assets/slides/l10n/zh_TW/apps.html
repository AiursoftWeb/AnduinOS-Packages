<div class="header">
    <h1 class="slidetitle">三層軟體架構，一體流暢體驗</h1>
</div>
<div class="main">
    <div class="text">
        <div>
            <p>AnduinOS 採用簡潔的三層架構進行套件管理。基礎系統依賴 <a href="https://ubuntu.com/">Ubuntu</a> 套件以確保穩定核心，而 AnduinOS 專屬元件則透過 <a href="https://github.com/aiursoftweb/apkg">Apkg</a> 管理——這是我們自研的輕量級套件工具。</p>
        </div>
        <div>
            <p>對於使用者端的應用程式，我們已以 <a href="https://flatpak.org/">Flatpak</a> 取代 Snap，用於提供沙箱化且跨發行版的應用程式分發。此舉可確保應用程式與系統隔離、節省磁碟空間，並讓您存取豐富的應用程式目錄。當然，當您需要時，<a href="https://appimage.org/">AppImage</a> 與傳統的 <a href="https://wiki.debian.org/Apt">APT</a> 隨時可用。</p>
        </div>
</div>
