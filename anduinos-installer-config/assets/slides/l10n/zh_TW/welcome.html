<p>感謝您安裝 <a href="https://www.anduinos.com/">AnduinOS</a>！</p>

<br />
<p>AnduinOS 是一款基於 <a href="https://ubuntu.com/">Ubuntu</a> 的客製化 Linux 發行版，設計理念是讓來自 Windows 或 macOS 的使用者能輕易上手。在 Ubuntu 龐大的軟體生態系統之上，AnduinOS 還擁有<a href="https://apkg.aiursoft.com/">專屬的套件儲存庫</a>，讓您在享受高度相容性的同時，也能體驗更為精緻的桌面環境。我們迫不及待想為您介紹它！</p>
