<div class="header">
    <h1 class="slidetitle">游戏体验不再是玩笑</h1>
</div>
<div class="main">
    <div class="text">
        <div>
            <p>我们过去常常嘲笑 Linux 不适合玩游戏。然而，随着 <a href="https://store.steampowered.com/">Steam</a>、<a href="https://www.winehq.org/">Wine</a> 和 <a href="https://www.protondb.com/">Proton</a> 等项目的进步，这种情况正在迅速改变。越来越多的游戏现在在 Linux 上获得官方支持。因此，如果您是一位游戏玩家，请不要再犹豫——尝试在 AnduinOS 上玩游戏，您会发现这是一个极具竞争力的选择。</p>
        </div>
</div>
