<div class="main wide">

<div class="text">

<div>
<p><a href="https://www.anduinos.com/">AnduinOS</a>를 설치해 주셔서 감사합니다!</p>

<br />
<p>AnduinOS는 Windows나 macOS에서 전환하시는 경우에도 익숙하고 사용하기 쉽도록 설계된 커스텀 <a href="https://ubuntu.com/">Ubuntu</a> 기반 리눅스 배포판입니다. Ubuntu의 방대한 소프트웨어 생태계 위에 <a href="https://apkg.aiursoft.com/">고유한 패키지 저장소</a>를 제공하므로, 최고의 양쪽의 장점을 모두 누리실 수 있습니다. 즉, 완벽한 호환성과 데스크톱용 추가적인 다듬은 품질을 제공합니다. 여러분에게 AnduinOS의 매력을 보여드릴 수 있게 되어 기대됩니다!</p>
